spring:
  application:
    name: TravelBooking

  datasource:
    url: jdbc:postgresql://db-postgres:5432/booking_room_travel
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: redis
      port: 6379
      timeout: 5000ms
      connect-timeout: 5s

      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 10000ms
        shutdown-timeout: 100ms
        client-options:
          auto-reconnect: true

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 10
          multiplier: 1.5

